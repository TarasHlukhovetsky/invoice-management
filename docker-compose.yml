services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-invoices}
      MYSQL_USER: ${DB_USERNAME:-invoices}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change_me_for_local_development}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - invoice_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -u root -p${DB_ROOT_PASSWORD:-root_password} --silent"
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  backend-php:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:${BACKEND_PORT:-8081}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-invoices}
      DB_USERNAME: ${DB_USERNAME:-invoices}
      DB_PASSWORD: ${DB_PASSWORD:-change_me_for_local_development}
      SEED_DATABASE: "true"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - invoice_network

  backend-nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      backend-php:
        condition: service_started
    ports:
      - "${BACKEND_PORT:-8081}:80"
    volumes:
      - ./backend:/var/www/html:ro
      - ./infra/nginx/backend.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - invoice_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend-nginx:
        condition: service_started
    environment:
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: "3000"
      NUXT_API_BASE: http://backend-nginx/api
      NUXT_PUBLIC_API_BASE: http://localhost:${BACKEND_PORT:-8081}/api
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - invoice_network

networks:
  invoice_network:
    driver: bridge

volumes:
  mysql_data: